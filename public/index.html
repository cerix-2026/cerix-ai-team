<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CeriX CEO-AI Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e4e4e7; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #16171d; border-right: 1px solid #27272a; padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar h1 { font-size: 18px; padding: 0 20px 20px; color: #a78bfa; display: flex; align-items: center; gap: 8px; }
    .sidebar h1 span { font-size: 24px; }
    .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #52525b; padding: 16px 20px 6px; }
    .nav-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; font-size: 14px; }
    .nav-item:hover { background: #1e1f26; }
    .nav-item.active { background: #1e1f26; color: #a78bfa; border-left: 3px solid #a78bfa; }
    .nav-item .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-left: auto; }
    .sidebar-spacer { flex: 1; }
    .sidebar-footer { padding: 12px 20px; font-size: 11px; color: #52525b; border-top: 1px solid #27272a; }
    .main { flex: 1; padding: 24px; overflow-y: auto; max-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h2 { font-size: 24px; font-weight: 600; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .status-online { background: #052e16; color: #4ade80; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #16171d; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }
    .card-label { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-value { font-size: 28px; font-weight: 700; color: #fff; }
    .card-sub { font-size: 12px; color: #a78bfa; margin-top: 4px; }
    .panel { background: #16171d; border: 1px solid #27272a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .panel h3 { font-size: 16px; margin-bottom: 16px; color: #d4d4d8; }
    .log-entry { padding: 8px 0; border-bottom: 1px solid #1e1f26; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
    .log-time { color: #52525b; min-width: 70px; font-family: monospace; font-size: 12px; }
    .log-agent { min-width: 70px; font-weight: 600; font-size: 12px; padding: 2px 6px; border-radius: 4px; text-align: center; }
    .agent-ceo { background: #312e81; color: #a78bfa; }
    .agent-research { background: #1e3a5f; color: #60a5fa; }
    .agent-leadgen { background: #14532d; color: #4ade80; }
    .agent-content { background: #713f12; color: #fbbf24; }
    .agent-finance { background: #4c1d95; color: #c084fc; }
    .lead-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1f26; }
    .lead-name { font-weight: 500; }
    .lead-info { font-size: 12px; color: #71717a; }
    .score { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .score-high { background: #052e16; color: #4ade80; }
    .score-med { background: #422006; color: #fbbf24; }
    .score-low { background: #450a0a; color: #f87171; }
    .loading { text-align: center; padding: 40px; color: #71717a; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #3f3f46; border-top: 2px solid #a78bfa; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; }

    /* Agent Grid */
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .agent-card { background: #16171d; border: 1px solid #27272a; border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .agent-card:hover { border-color: #a78bfa; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .agent-card.selected { border-color: #a78bfa; box-shadow: 0 0 0 2px rgba(167,139,250,0.3); }
    .agent-avatar { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 12px; }
    .agent-card-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .agent-card-role { font-size: 13px; color: #71717a; margin-bottom: 12px; }
    .agent-card-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4ade80; }
    .agent-card-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }

    /* Chat */
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 80px); }
    .chat-header { display: flex; align-items: center; gap: 16px; padding-bottom: 16px; border-bottom: 1px solid #27272a; margin-bottom: 16px; }
    .chat-header-avatar { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .chat-header-info h2 { font-size: 20px; margin-bottom: 2px; }
    .chat-header-info p { font-size: 13px; color: #71717a; }
    .chat-back { background: none; border: 1px solid #27272a; color: #a78bfa; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-left: auto; }
    .chat-back:hover { background: #1e1f26; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .chat-msg.user { align-self: flex-end; background: #7c3aed; color: white; border-bottom-right-radius: 4px; }
    .chat-msg.agent { align-self: flex-start; background: #1e1f26; color: #e4e4e7; border-bottom-left-radius: 4px; }
    .chat-msg.agent .msg-name { font-size: 11px; color: #a78bfa; font-weight: 600; margin-bottom: 4px; }
    .chat-msg.thinking { align-self: flex-start; background: #1e1f26; color: #71717a; font-style: italic; }
    .chat-input-bar { display: flex; gap: 8px; padding-top: 16px; border-top: 1px solid #27272a; align-items: flex-end; }
    .chat-input { flex: 1; background: #0f1117; border: 1px solid #27272a; border-radius: 12px; padding: 12px 16px; color: #e4e4e7; font-size: 14px; font-family: inherit; resize: none; min-height: 46px; max-height: 120px; outline: none; }
    .chat-input:focus { border-color: #7c3aed; }
    .chat-input::placeholder { color: #52525b; }
    .voice-btn { width: 46px; height: 46px; border-radius: 50%; border: 2px solid #27272a; background: #16171d; color: #71717a; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .voice-btn:hover { border-color: #a78bfa; color: #a78bfa; }
    .voice-btn.recording { border-color: #ef4444; color: #ef4444; background: #1c1017; animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
    .send-btn { width: 46px; height: 46px; border-radius: 50%; border: none; background: #7c3aed; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .send-btn:hover { background: #6d28d9; }
    .send-btn:disabled { background: #3f3f46; cursor: not-allowed; }

    /* Task form */
    .task-form { display: flex; flex-direction: column; gap: 12px; }
    .task-form input, .task-form textarea, .task-form select { background: #0f1117; border: 1px solid #27272a; border-radius: 8px; padding: 10px 14px; color: #e4e4e7; font-size: 14px; resize: vertical; font-family: inherit; }
    .task-form textarea { min-height: 80px; }
    .result-panel { background: #0f1117; border: 1px solid #27272a; border-radius: 8px; padding: 16px; margin-top: 12px; white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto; }

    /* Skills */
    .skill-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .skill-card { background: #16171d; border: 1px solid #27272a; border-radius: 14px; padding: 20px; transition: all 0.2s; }
    .skill-card:hover { border-color: #3f3f46; }
    .skill-card.installed { border-color: #4ade80; background: #0d1f14; }
    .skill-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .skill-icon { width: 42px; height: 42px; border-radius: 10px; background: #1e1f26; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .skill-name { font-size: 16px; font-weight: 600; }
    .skill-category { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #27272a; color: #a1a1aa; }
    .skill-desc { font-size: 13px; color: #a1a1aa; margin-bottom: 12px; line-height: 1.5; }
    .skill-agents { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .skill-agent-tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #1e1f26; color: #71717a; }
    .skill-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .skill-btn-install { background: #7c3aed; color: white; }
    .skill-btn-install:hover { background: #6d28d9; }
    .skill-btn-remove { background: #1e1f26; color: #f87171; border: 1px solid #27272a; }
    .skill-btn-remove:hover { background: #1c1017; border-color: #f87171; }
    .skill-filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .skill-filter { padding: 6px 14px; border-radius: 20px; border: 1px solid #27272a; background: #16171d; color: #a1a1aa; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .skill-filter:hover { border-color: #a78bfa; color: #a78bfa; }
    .skill-filter.active { background: #7c3aed; color: white; border-color: #7c3aed; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const AGENTS = {
      ceo: { icon: '🧠', label: 'CEO Agent', role: 'Orchestrator & Strategist', color: 'agent-ceo', bg: '#312e81', endpoint: '/api/agents/task', desc: 'Modtager opgaver, laver planer og delegerer til andre agenter. Din primære kontakt.' },
      research: { icon: '🔍', label: 'Research Agent', role: 'Markedsanalyse & Insights', color: 'agent-research', bg: '#1e3a5f', endpoint: '/api/agents/research', desc: 'Analyserer markeder, trends og konkurrenter. Leverer dybdegående research rapporter.' },
      leadgen: { icon: '🎯', label: 'LeadGen Agent', role: 'Lead Generation & Scoring', color: 'agent-leadgen', bg: '#14532d', endpoint: '/api/agents/leadgen', desc: 'Finder og scorer B2B-leads. Identificerer virksomheder der matcher din ICP.' },
      content: { icon: '✍️', label: 'Content Agent', role: 'Content & Outreach', color: 'agent-content', bg: '#713f12', endpoint: '/api/agents/content', desc: 'Skriver outreach-emails, LinkedIn-beskeder og marketingindhold.' },
      finance: { icon: '📊', label: 'Finance Agent', role: 'KPI & Finansanalyse', color: 'agent-finance', bg: '#4c1d95', endpoint: '/api/agents/finance', desc: 'Tracker KPIs, analyserer revenue og genererer finansrapporter.' },
    };

    function App() {
      const [page, setPage] = useState('dashboard');
      const [kpi, setKpi] = useState(null);
      const [leads, setLeads] = useState([]);
      const [logs, setLogs] = useState([]);
      const [jobs, setJobs] = useState([]);
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [chatHistory, setChatHistory] = useState({});
      const [sending, setSending] = useState(false);
      const [inputText, setInputText] = useState('');
      const [recording, setRecording] = useState(false);
      const [taskResult, setTaskResult] = useState(null);
      const [allSkills, setAllSkills] = useState([]);
      const [skillFilter, setSkillFilter] = useState('Alle');
      const messagesEnd = useRef(null);
      const recognitionRef = useRef(null);
      const textareaRef = useRef(null);

      const fetchData = useCallback(async () => {
        try {
          const [kpiRes, leadsRes, logsRes, jobsRes, skillsRes] = await Promise.all([
            fetch('/api/data/kpi').then(r => r.json()),
            fetch('/api/data/leads').then(r => r.json()),
            fetch('/api/data/logs?limit=30').then(r => r.json()),
            fetch('/api/data/jobs').then(r => r.json()),
            fetch('/api/skills').then(r => r.json()),
          ]);
          if (kpiRes.success) setKpi(kpiRes.data);
          if (leadsRes.success) setLeads(leadsRes.data);
          if (logsRes.success) setLogs(logsRes.data);
          if (jobsRes.success) setJobs(jobsRes.data);
          if (skillsRes.success) setAllSkills(skillsRes.data);
        } catch (e) { console.error(e); }
      }, []);

      async function toggleSkill(slug, isInstalled) {
        try {
          const action = isInstalled ? 'uninstall' : 'install';
          await fetch(`/api/skills/${slug}/${action}`, { method: 'POST' });
          fetchData();
        } catch (e) { console.error(e); }
      }

      useEffect(() => { fetchData(); const i = setInterval(fetchData, 15000); return () => clearInterval(i); }, [fetchData]);
      useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatHistory, selectedAgent]);

      function openChat(agentKey) {
        setSelectedAgent(agentKey);
        setPage('chat');
        if (!chatHistory[agentKey]) {
          const agent = AGENTS[agentKey];
          setChatHistory(prev => ({
            ...prev,
            [agentKey]: [{ role: 'agent', text: `Hej! Jeg er ${agent.label}. ${agent.desc}\n\nHvad kan jeg hjelpe med?` }]
          }));
        }
      }

      async function sendMessage() {
        if (!inputText.trim() || sending || !selectedAgent) return;
        const msg = inputText.trim();
        setInputText('');
        const agentKey = selectedAgent;
        const agent = AGENTS[agentKey];

        setChatHistory(prev => ({
          ...prev,
          [agentKey]: [...(prev[agentKey] || []), { role: 'user', text: msg }]
        }));
        setSending(true);

        setChatHistory(prev => ({
          ...prev,
          [agentKey]: [...(prev[agentKey] || []), { role: 'thinking', text: `${agent.icon} ${agent.label} arbejder...` }]
        }));

        try {
          const res = await fetch('/api/agents/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent: agentKey, message: msg }),
          });
          const data = await res.json();

          setChatHistory(prev => {
            const hist = (prev[agentKey] || []).filter(m => m.role !== 'thinking');
            const responseText = data.success ? data.message : `Fejl: ${data.error}`;
            return { ...prev, [agentKey]: [...hist, { role: 'agent', text: responseText }] };
          });
          fetchData();
        } catch (e) {
          setChatHistory(prev => {
            const hist = (prev[agentKey] || []).filter(m => m.role !== 'thinking');
            return { ...prev, [agentKey]: [...hist, { role: 'agent', text: `Fejl: ${e.message}` }] };
          });
        }
        setSending(false);
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      }

      function toggleVoice() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          alert('Din browser understøtter ikke stemmeinput. Brug Chrome.');
          return;
        }
        if (recording) {
          recognitionRef.current?.stop();
          setRecording(false);
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'da-DK';
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
          }
          setInputText(transcript);
        };
        recognition.onend = () => { setRecording(false); };
        recognition.onerror = () => { setRecording(false); };
        recognitionRef.current = recognition;
        recognition.start();
        setRecording(true);
      }

      async function sendTask(e) {
        e.preventDefault();
        const form = e.target;
        const title = form.title.value;
        const description = form.description.value;
        const priority = form.priority.value;
        if (!title || !description) return;
        setSending(true);
        setTaskResult(null);
        try {
          const res = await fetch('/api/agents/task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, priority }),
          });
          const data = await res.json();
          setTaskResult(data);
          form.reset();
          fetchData();
        } catch (e) { setTaskResult({ success: false, error: e.message }); }
        setSending(false);
      }

      const overview = kpi?.overview || {};
      const currentMessages = selectedAgent ? (chatHistory[selectedAgent] || []) : [];

      return (
        <div className="app">
          <div className="sidebar">
            <h1><span>🤖</span> CEO-AI</h1>
            <div className="nav-section">Oversigt</div>
            {[
              ['dashboard', '📊', 'Dashboard'],
              ['agents', '🤖', 'Agenter'],
              ['task', '📝', 'Send Opgave'],
              ['skills', '🧩', 'Skills'],
            ].map(([key, icon, label]) => (
              <div key={key} className={`nav-item ${page === key ? 'active' : ''}`} onClick={() => { setPage(key); setSelectedAgent(null); }}>
                {icon} {label}
              </div>
            ))}
            <div className="nav-section">Chat med Agent</div>
            {Object.entries(AGENTS).map(([key, agent]) => (
              <div key={key} className={`nav-item ${page === 'chat' && selectedAgent === key ? 'active' : ''}`} onClick={() => openChat(key)}>
                {agent.icon} {agent.label.replace(' Agent', '')}
                <span className="agent-dot"></span>
              </div>
            ))}
            <div className="nav-section">Data</div>
            {[
              ['leads', '🎯', 'Leads'],
              ['activity', '📋', 'Aktivitet'],
              ['jobs', '⚡', 'Jobs'],
            ].map(([key, icon, label]) => (
              <div key={key} className={`nav-item ${page === key ? 'active' : ''}`} onClick={() => setPage(key)}>
                {icon} {label}
              </div>
            ))}
            <div className="sidebar-spacer"></div>
            <div className="sidebar-footer">CeriX CEO-AI v1.0 &middot; 5 agenter online</div>
          </div>

          <div className="main">
            {/* DASHBOARD */}
            {page === 'dashboard' && (
              <>
                <div className="header">
                  <h2>Dashboard</h2>
                  <span className="status-badge status-online">● System Online</span>
                </div>
                <div className="cards">
                  <div className="card"><div className="card-label">Total Leads</div><div className="card-value">{overview.totalLeads || 0}</div><div className="card-sub">{overview.qualifiedLeads || 0} kvalificerede</div></div>
                  <div className="card"><div className="card-label">Emails</div><div className="card-value">{overview.sentEmails || 0}</div><div className="card-sub">{overview.totalEmails || 0} total oprettet</div></div>
                  <div className="card"><div className="card-label">Jobs Afsluttet</div><div className="card-value">{overview.completedJobs || 0}</div></div>
                  <div className="card"><div className="card-label">Revenue (DKK)</div><div className="card-value">{Number(overview.totalRevenue || 0).toLocaleString('da-DK')}</div></div>
                </div>
                <div className="panel">
                  <h3>Seneste Aktivitet</h3>
                  {(kpi?.recentActivity || []).slice(0, 8).map((log, i) => (
                    <div key={i} className="log-entry">
                      <span className="log-time">{new Date(log.created_at).toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'})}</span>
                      <span className={`log-agent ${AGENTS[log.agent]?.color || ''}`}>{AGENTS[log.agent]?.icon} {log.agent}</span>
                      <span>{log.action}: {(log.details || '').slice(0, 100)}</span>
                    </div>
                  ))}
                  {(!kpi?.recentActivity?.length) && <div className="loading">Ingen aktivitet endnu. Klik på en agent og start en samtale!</div>}
                </div>
              </>
            )}

            {/* AGENTS OVERVIEW */}
            {page === 'agents' && (
              <>
                <div className="header"><h2>Dine Agenter</h2><span className="status-badge status-online">● Alle online</span></div>
                <div className="agent-grid">
                  {Object.entries(AGENTS).map(([key, agent]) => (
                    <div key={key} className="agent-card" onClick={() => openChat(key)}>
                      <div className="agent-avatar" style={{background: agent.bg}}>{agent.icon}</div>
                      <div className="agent-card-name">{agent.label}</div>
                      <div className="agent-card-role">{agent.role}</div>
                      <div style={{fontSize:'13px', color:'#a1a1aa', marginBottom:'12px'}}>{agent.desc}</div>
                      <div className="agent-card-status"><span className="dot"></span> Online &middot; Klar til opgaver</div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* CHAT */}
            {page === 'chat' && selectedAgent && (
              <div className="chat-container">
                <div className="chat-header">
                  <div className="chat-header-avatar" style={{background: AGENTS[selectedAgent].bg}}>
                    {AGENTS[selectedAgent].icon}
                  </div>
                  <div className="chat-header-info">
                    <h2>{AGENTS[selectedAgent].label}</h2>
                    <p>{AGENTS[selectedAgent].role}</p>
                  </div>
                  <button className="chat-back" onClick={() => setPage('agents')}>← Alle agenter</button>
                </div>
                <div className="chat-messages">
                  {currentMessages.map((msg, i) => (
                    <div key={i} className={`chat-msg ${msg.role}`}>
                      {msg.role === 'agent' && <div className="msg-name">{AGENTS[selectedAgent].icon} {AGENTS[selectedAgent].label}</div>}
                      {msg.text}
                    </div>
                  ))}
                  <div ref={messagesEnd} />
                </div>
                <div className="chat-input-bar">
                  <button className={`voice-btn ${recording ? 'recording' : ''}`} onClick={toggleVoice} title={recording ? 'Stop optagelse' : 'Tal til agenten'}>
                    {recording ? '⏹' : '🎤'}
                  </button>
                  <textarea
                    ref={textareaRef}
                    className="chat-input"
                    placeholder={`Skriv eller tal til ${AGENTS[selectedAgent].label}...`}
                    value={inputText}
                    onChange={e => setInputText(e.target.value)}
                    onKeyDown={handleKeyDown}
                    rows={1}
                  />
                  <button className="send-btn" onClick={sendMessage} disabled={sending || !inputText.trim()} title="Send besked">
                    {sending ? <span className="spinner" style={{width:16,height:16,margin:0}}></span> : '➤'}
                  </button>
                </div>
              </div>
            )}

            {/* SEND OPGAVE */}
            {page === 'task' && (
              <>
                <div className="header"><h2>Send Opgave til CEO Agent</h2></div>
                <div className="panel">
                  <form className="task-form" onSubmit={sendTask}>
                    <input name="title" placeholder="Opgave titel (fx: Find 10 danske SMV'er der kunne bruge AI)" required />
                    <textarea name="description" placeholder="Beskrivelse af opgaven..." required />
                    <select name="priority">
                      <option value="medium">Normal prioritet</option>
                      <option value="high">Hoj prioritet</option>
                      <option value="urgent">Urgent</option>
                      <option value="low">Lav prioritet</option>
                    </select>
                    <button type="submit" className="btn btn-primary" disabled={sending}>
                      {sending ? <><span className="spinner"></span> CEO Agent arbejder...</> : '🧠 Send til CEO Agent'}
                    </button>
                  </form>
                  {taskResult && (
                    <div className="result-panel">
                      <strong>{taskResult.success ? '✅ Opgave afsluttet' : '❌ Fejl'}</strong>
                      <pre>{JSON.stringify(taskResult.data || taskResult.error, null, 2)}</pre>
                    </div>
                  )}
                </div>
              </>
            )}

            {/* LEADS */}
            {page === 'leads' && (
              <>
                <div className="header"><h2>Leads ({leads.length})</h2></div>
                <div className="panel">
                  {leads.length === 0 && <div className="loading">Ingen leads endnu. Chat med LeadGen Agent for at finde leads!</div>}
                  {leads.map((lead, i) => (
                    <div key={i} className="lead-row">
                      <div>
                        <div className="lead-name">{lead.company_name}</div>
                        <div className="lead-info">{lead.contact_name} &middot; {lead.industry} &middot; {lead.location}</div>
                      </div>
                      <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
                        <span className={`score ${lead.score >= 70 ? 'score-high' : lead.score >= 40 ? 'score-med' : 'score-low'}`}>{lead.score}</span>
                        <span className="status-badge" style={{background:'#1e1f26', fontSize:'11px'}}>{lead.status}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* ACTIVITY */}
            {page === 'activity' && (
              <>
                <div className="header"><h2>Agent Aktivitet</h2></div>
                <div className="panel">
                  {logs.length === 0 && <div className="loading">Ingen aktivitet endnu.</div>}
                  {logs.map((log, i) => (
                    <div key={i} className="log-entry">
                      <span className="log-time">{new Date(log.created_at).toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
                      <span className={`log-agent ${AGENTS[log.agent]?.color || ''}`}>{AGENTS[log.agent]?.icon} {log.agent}</span>
                      <span style={{color: log.status === 'error' ? '#f87171' : log.status === 'success' ? '#4ade80' : '#d4d4d8'}}>
                        {log.action}: {(log.details || '').slice(0, 150)}
                      </span>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* JOBS */}
            {page === 'jobs' && (
              <>
                <div className="header"><h2>Jobs ({jobs.length})</h2></div>
                <div className="panel">
                  {jobs.length === 0 && <div className="loading">Ingen jobs endnu.</div>}
                  {jobs.map((job, i) => (
                    <div key={i} className="lead-row">
                      <div>
                        <div className="lead-name">{job.title}</div>
                        <div className="lead-info">Agent: {job.assigned_agent} &middot; Prioritet: {job.priority}</div>
                      </div>
                      <span className="status-badge"
                        style={{background: job.status === 'completed' ? '#052e16' : job.status === 'in_progress' ? '#422006' : '#1e1f26',
                                color: job.status === 'completed' ? '#4ade80' : job.status === 'in_progress' ? '#fbbf24' : '#71717a'}}>
                        {job.status}
                      </span>
                    </div>
                  ))}
                </div>
              </>
            )}
            {/* SKILLS MARKETPLACE */}
            {page === 'skills' && (() => {
              const categories = ['Alle', ...new Set(allSkills.map(s => s.category))];
              const filtered = skillFilter === 'Alle' ? allSkills : allSkills.filter(s => s.category === skillFilter);
              const installedCount = allSkills.filter(s => s.installed).length;
              return (
                <>
                  <div className="header">
                    <h2>Skills Marketplace</h2>
                    <span className="status-badge" style={{background:'#1e1f26', color:'#a78bfa'}}>{installedCount} / {allSkills.length} installeret</span>
                  </div>
                  <div className="skill-filter-bar">
                    {categories.map(cat => (
                      <button key={cat} className={`skill-filter ${skillFilter === cat ? 'active' : ''}`} onClick={() => setSkillFilter(cat)}>{cat}</button>
                    ))}
                  </div>
                  <div className="skill-grid">
                    {filtered.map(skill => {
                      const agents = typeof skill.agents === 'string' ? JSON.parse(skill.agents) : (skill.agents || []);
                      return (
                        <div key={skill.slug} className={`skill-card ${skill.installed ? 'installed' : ''}`}>
                          <div className="skill-card-header">
                            <div className="skill-icon">{skill.icon}</div>
                            <div>
                              <div className="skill-name">{skill.name}</div>
                              <span className="skill-category">{skill.category}</span>
                            </div>
                          </div>
                          <div className="skill-desc">{skill.description}</div>
                          <div className="skill-agents">
                            {agents.map(a => (
                              <span key={a} className="skill-agent-tag">{AGENTS[a]?.icon} {AGENTS[a]?.label.replace(' Agent','') || a}</span>
                            ))}
                          </div>
                          <button className={`skill-btn ${skill.installed ? 'skill-btn-remove' : 'skill-btn-install'}`} onClick={() => toggleSkill(skill.slug, skill.installed)}>
                            {skill.installed ? '✕ Afinstallér' : '⬇ Installér'}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}

          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
